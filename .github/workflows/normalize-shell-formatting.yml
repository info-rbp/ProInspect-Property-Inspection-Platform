name: Normalize shell PR formatting

on:
  push:
    branches:
      - agent/complete-application-shell

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-application-shell
          fetch-depth: 0
      - name: Apply repository formatter
        run: node scripts/format.mjs --write
      - name: Remove one-off workflow
        run: rm .github/workflows/normalize-shell-formatting.yml
      - name: Commit normalized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize repository formatting"
          git push origin HEAD:agent/complete-application-shell
