name: Terraform

on:
  pull_request:
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform*.yml"
  push:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform*.yml"

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - run: terraform fmt -check -recursive infrastructure/terraform

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - infrastructure/terraform/bootstrap
          - infrastructure/terraform/environments/development
          - infrastructure/terraform/environments/staging
          - infrastructure/terraform/environments/production
          - infrastructure/terraform/delivery
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Initialise ${{ matrix.root }}
        run: terraform -chdir=${{ matrix.root }} init -backend=false -input=false -no-color
      - name: Validate ${{ matrix.root }}
        run: terraform -chdir=${{ matrix.root }} validate -no-color
